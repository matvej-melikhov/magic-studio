name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # TODO: закоммитить web/package-lock.json и перейти на `npm ci` + кеш
      - name: Build frontend
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' --exclude 'venv' --exclude '__pycache__' \
            --exclude 'web/node_modules' \
            --exclude '.env' --exclude 'studio.db*' \
            --exclude 'login_codes.json' --exclude 'state.json' \
            --exclude 'data.json*' \
            ./ "$USER@$HOST:/opt/markdown-bot-dev/"

      - name: Restart services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$USER@$HOST" 'bash /opt/markdown-bot-dev/deploy/update.sh dev'
