name: Deploy DEV

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    environment: dev
    steps:
      # dev-стенд один: пока открыт другой PR, второй на стенд не пускаем
      - name: Стенд свободен (нет других открытых PR)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          others=$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --state open \
            --json number --jq '[.[] | select(.number != ${{ github.event.pull_request.number }})] | length')
          if [ "$others" != "0" ]; then
            echo "::error::Dev-стенд занят другим открытым PR ($others шт.) — деплой заблокирован. Закройте или влейте его."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to server
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude '.git' --exclude 'venv' --exclude '__pycache__' \
            --exclude 'web/node_modules' \
            --exclude '.env' --exclude 'studio.db*' \
            --exclude 'login_codes.json' --exclude 'state.json' \
            --exclude 'data.json*' \
            ./ "$USER@$HOST:/opt/markdown-bot-dev/"

      - name: Restart services
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$USER@$HOST" 'bash /opt/markdown-bot-dev/deploy/update.sh dev'
