name: Tests

on:
  workflow_call:      # вызывается деплоями: сначала тесты, потом выкатка
  workflow_dispatch:

jobs:
  backend:
    name: Бэкенд (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Зависимости
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Тесты
        run: python -m pytest tests -q

  frontend:
    name: Фронтенд (vitest + сборка)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Зависимости
        run: npm ci
      - name: Тесты
        run: npx vitest run
      - name: Сборка
        run: npm run build
