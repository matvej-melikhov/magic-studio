# Роутинг стендов: /prod/ — prod (8082), /dev/ — dev (8081),
# всё остальное (включая корень) переезжает в /prod/ с сохранением пути
server {
    listen 80 default_server;
    server_name _;
    # медиа загружаются как base64-JSON (файл до 45 МБ → ~60 МБ тела)
    client_max_body_size 80m;

    location = /dev { return 301 /dev/; }
    location /dev/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_read_timeout 300s;
        # AI-стрим (NDJSON): отдавать токены сразу, не копить
        proxy_buffering off;
    }

    location = /prod { return 301 /prod/; }
    location /prod/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # старые адреса (корень, /api/… у установленных PWA) — в /prod/…;
    # 308 сохраняет метод POST
    location / { return 308 /prod$request_uri; }
}
